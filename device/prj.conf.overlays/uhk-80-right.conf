# Enable dynamic pinctrl support
CONFIG_PINCTRL=y
CONFIG_PINCTRL_DYNAMIC=y

CONFIG_SHELL=y
CONFIG_SHELL_AUTOSTART=y

# Radio-notification connection callback: gives a deterministic "prepare"
# callback a fixed time before each connection event's anchor point. Used to
# build exactly one HID report per connection event instead of estimating the
# transport window from the (jittery) report-sent callback.
# Selects BT_CTLR_SDC_CONN_ANCHOR_POINT_REPORT and BT_HCI_VS_EVT_USER.
CONFIG_BT_RADIO_NOTIFICATION_CONN_CB=y


